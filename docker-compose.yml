services:
  # 1. BAZA DANYCH
  postgres_db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - ./database:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND
  api_server:
    build: ./backend
    ports:
      - "8081:8080"
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. FRONTEND
  client_app:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api_server
    volumes:
      - ./frontend:/app
      - /app/node_modules
